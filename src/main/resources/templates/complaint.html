<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Complaint Registration</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#007bff;
        }

        label{
            font-weight:bold;
        }

        input, textarea, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Complaint Registration Form</h2>

    <form action="/complaint" method="post">

        <label>Complaint Title</label>
        <input type="text" name="title" placeholder="Enter Complaint Title" required>

        <label>Description</label>
        <textarea name="description" rows="5"
        placeholder="Describe your complaint" required></textarea>

        <label>Category</label>
        <select name="category">
            <option>Electricity</option>
            <option>Water</option>
            <option>Internet</option>
            <option>Hostel</option>
            <option>Transport</option>
            <option>Other</option>
        </select>

        <label>Priority</label>
        <select name="priority">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <label>Status</label>
        <input type="text" name="status" value="Pending" readonly>

        <label>User ID</label>
        <input type="number" name="userId" placeholder="Enter User ID">

        <button type="submit">
            Submit Complaint
        </button>

    </form>

</div>

</body>
</html>
