<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        .container{
            width:450px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#007bff;
        }

        label{
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
            color:#007bff;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>User Registration</h2>

    <form action="/user/register" method="post">

        <label>Name</label>
        <input
                type="text"
                name="name"
                placeholder="Enter Name"
                required>

        <label>Email</label>
        <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

        <label>Password</label>
        <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

        <label>Phone Number</label>
        <input
                type="text"
                name="phone"
                placeholder="Enter Phone Number"
                required>

        <label>Role</label>
        <select name="role">
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
        </select>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="/login">Login Here</a>
    </p>

</div>

</body>
</html>
