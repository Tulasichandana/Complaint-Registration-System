<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Registration System</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:#007bff;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:80%;
            margin:auto;
            text-align:center;
            margin-top:60px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            color:#333;
        }

        p{
            color:#666;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            margin:15px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#0056b3;
        }

        footer{
            margin-top:100px;
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>

</head>
<body>

<header>
    <h1>Complaint Registration System</h1>
</header>

<div class="container">

    <div class="card">

        <h2>Welcome</h2>

        <p>
            Register complaints quickly and track their status online.
        </p>

        <a href="/login.html" class="btn">Login</a>

        <a href="/register.html" class="btn">Register</a>

        <a href="/complaint.html" class="btn">Raise Complaint</a>

    </div>

</div>

<footer>

    © 2026 Complaint Registration System

</footer>

</body>
</html>
